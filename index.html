<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2530/2530005.png">
    <title>Snow Rider 3D | N-Studios Edition</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        #game-container { width: 100%; height: 85vh; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .content { padding: 40px; max-width: 900px; margin: auto; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px); 
            border-radius: 30px; 
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        h1 { color: #00d4ff; font-size: 2.5rem; margin-top: 0; }
        .badge { background: #ffcc00; color: black; padding: 5px 12px; border-radius: 50px; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>
   <div id="game-container">
        <iframe src="https://4thfritely-bit.github.io/snowrider3d/"></iframe>
    </div>
    <div class="content">
        <div class="glass-card">
            <span class="badge">N-STUDIOS ORIGINAL</span>
            <h1>Snow Rider 3D Ultra</h1>
            <p>Disfruta de la versión más fluida y optimizada de Snow Rider 3D. Sin anuncios intrusivos, solo velocidad pura en la nieve.</p>
            <div style="margin-top: 20px; opacity: 0.6; font-size: 0.9rem;">
                🎮 Controles: Flechas o WASD para moverte | Espacio para saltar.
            </div>
        </div>
    </div>
</body>
</html>
